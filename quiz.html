:root{ --navy:#1A2F8A; --red:#C0392B; --yellow:#F1C40F; --green:#27AE60; --text:#1C1C1C;
       --muted:#5A6072; --line:#E2E5EE; --soft:#F5F6FA; --white:#fff;
       --font:'A2Z','Pretendard','Noto Sans KR',system-ui,sans-serif; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:var(--font); color:var(--text); background:var(--soft);
      min-height:100vh; display:flex; flex-direction:column; }
header{ background:var(--navy); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:14px; }
header img{ height:26px; }
header .t{ font-weight:700; font-size:16px; }
header .mode{ margin-left:auto; font-size:13px; color:#C7D0EE; }
header button{ background:transparent; border:1px solid #5A6BB5; color:#C7D0EE; border-radius:6px;
               padding:5px 12px; font-family:var(--font); font-size:12px; cursor:pointer; }
header button:hover{ background:#24399B; color:#fff; }
main{ flex:1; display:flex; align-items:center; justify-content:center; padding:28px 20px; }
.wrap{ width:100%; max-width:1000px; }
.bar{ height:6px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:22px; }
.bar > i{ display:block; height:100%; background:var(--yellow); width:0; transition:width .25s; }
.meta{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
       color:var(--muted); font-size:13px; }
.card{ background:#fff; border-radius:14px; padding:34px 36px; box-shadow:0 2px 14px rgba(26,47,138,.08); }
h1{ font-size:30px; font-weight:800; color:var(--navy); margin-bottom:10px; }
.qtext{ font-size:30px; font-weight:700; line-height:1.45; margin-bottom:24px; }
.choices{ display:grid; gap:12px; }
.ox .choices{ grid-template-columns:1fr 1fr; }
.choice{ display:flex; align-items:center; gap:12px; border:2px solid var(--line); background:#fff;
         border-radius:10px; padding:16px 18px; font-family:var(--font); font-size:19px; text-align:left;
         cursor:pointer; transition:.12s; }
.choice:hover{ border-color:var(--navy); }
.choice .k{ flex:0 0 30px; height:30px; border-radius:50%; background:var(--soft); color:var(--navy);
            font-weight:700; display:grid; place-items:center; font-size:15px; }
.ox .choice{ justify-content:center; font-size:40px; font-weight:800; color:var(--navy); padding:22px; }
.choice.correct{ border-color:var(--green); background:#EAF7F0; }
.choice.wrong{ border-color:var(--red); background:#FBEEEC; }
.choice[disabled]{ cursor:default; }
.reveal{ margin-top:22px; padding:18px 20px; background:var(--soft); border-left:6px solid var(--yellow);
         border-radius:8px; display:none; }
.reveal.on{ display:block; }
.reveal .a{ font-size:20px; font-weight:800; color:var(--navy); margin-bottom:6px; }
.reveal .e{ font-size:15px; line-height:1.6; }
.nav{ display:flex; gap:10px; margin-top:24px; }
button.btn{ font-family:var(--font); font-size:15px; font-weight:700; border:0; border-radius:9px;
            padding:13px 22px; cursor:pointer; background:var(--navy); color:#fff; }
button.btn.ghost{ background:#fff; color:var(--navy); border:1.5px solid var(--line); }
button.btn:disabled{ opacity:.35; cursor:default; }
.spacer{ flex:1; }
.hint{ color:var(--muted); font-size:13px; margin-top:14px; }
/* 시작 화면 */
.start{ text-align:center; }
.start p{ color:var(--muted); margin-bottom:26px; font-size:15px; }
.modes{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.mode-card{ border:2px solid var(--line); border-radius:12px; padding:26px 20px; background:#fff;
            cursor:pointer; font-family:var(--font); text-align:center; transition:.12s; }
.mode-card:hover{ border-color:var(--navy); transform:translateY(-2px); }
.mode-card b{ display:block; font-size:20px; color:var(--navy); margin-bottom:8px; }
.mode-card span{ font-size:13px; color:var(--muted); line-height:1.5; }
/* 결과 */
.score{ font-size:64px; font-weight:800; color:var(--navy); text-align:center; }
.score small{ font-size:22px; color:var(--muted); font-weight:500; }
.verdict{ text-align:center; font-size:19px; font-weight:700; margin:8px 0 20px; }
.verdict.pass{ color:var(--green); } .verdict.fail{ color:var(--red); }
.wrongs{ background:var(--soft); border-radius:10px; padding:16px 18px; }
.wrongs h3{ font-size:15px; color:var(--navy); margin-bottom:8px; }
.wrongs li{ margin:6px 0 6px 18px; font-size:14px; }
/* 체크리스트 */
.ckgroup{ margin-bottom:20px; }
.ckgroup h3{ font-size:16px; color:var(--navy); border-bottom:1.5px solid var(--line);
             padding-bottom:6px; margin-bottom:10px; }
label.ck{ display:flex; gap:12px; align-items:flex-start; padding:9px 10px; border-radius:8px; cursor:pointer; }
label.ck:hover{ background:var(--soft); }
label.ck input{ width:20px; height:20px; accent-color:var(--navy); flex:0 0 auto; margin-top:1px; }
label.ck span{ font-size:15.5px; line-height:1.5; }
label.ck input:checked + span{ color:var(--muted); text-decoration:line-through; }
.ckbar{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.ckbar b{ color:var(--navy); font-size:15px; }
footer{ text-align:center; color:var(--muted); font-size:12px; padding:14px; }
@media print{ header button, .nav{ display:none; } }

<script>
const D = {"quiz": [{"n": 1, "type": "ox", "text": "일본 가정에서 목욕을 마친 뒤에는 다음 사람을 위해 욕조 물을 빼 둔다.", "choices": ["O", "X"], "answer": 1, "explain": "일본 가정의 욕조 물은 가족이 순서대로 함께 쓴다. 물을 빼면 다음 사람이 쓸 물이 없어진다. 그래서 들어가기 전에 몸을 씻고, 욕조 안에서 비누를 쓰지 않는 것."}, {"n": 2, "type": "ox", "text": "밥그릇과 국그릇은 상에 둔 채 고개를 숙여 먹는 것이 일본의 바른 식사 자세다.", "choices": ["O", "X"], "answer": 1, "explain": "한국과 반대로, 일본에서는 밥그릇·국그릇을 손에 들고 먹는 것이 바른 자세다."}, {"n": 3, "type": "ox", "text": "라멘이나 소바 같은 면 요리는 소리를 내어 먹어도 실례가 아니다.", "choices": ["O", "X"], "answer": 0, "explain": "면 요리는 소리 내어 먹어도 실례가 아니다. 단, 그 외 음식은 소리를 자제한다."}, {"n": 4, "type": "ox", "text": "다다미 방에는 실내 슬리퍼를 신은 채 들어가면 된다.", "choices": ["O", "X"], "answer": 1, "explain": "다다미 방에는 슬리퍼를 벗고 들어간다. 다다미가 상하기 쉽기 때문."}, {"n": 5, "type": "ox", "text": "알러지 정보는 학교가 일본 측에 이미 전달했으므로, 식탁에서 따로 확인할 필요는 없다.", "choices": ["O", "X"], "answer": 1, "explain": "학교가 전달했더라도 식탁에서 스스로 한 번 더 확인한다. 「스미마셍, ○○와 다베라레마셍」. 내 안전은 내가 지킨다."}, {"n": 6, "type": "ox", "text": "길을 잃었을 때는 일행을 찾아 계속 이동하는 것보다 그 자리에서 기다리는 편이 좋다.", "choices": ["O", "X"], "answer": 0, "explain": "그 자리에서 대기하거나 가까운 편의점 직원에게 도움을 요청하는 것이 원칙. 움직일수록 찾기 어려워진다."}, {"n": 7, "type": "mc", "text": "호스트 가정 현관에 들어설 때 하는 인사는?", "choices": ["오야스미나사이", "오자마시마스", "고치소-사마데시타", "사요-나라"], "answer": 1, "explain": "들어갈 때 「오자마시마스」, 나올 때 「오자마시마시타」."}, {"n": 8, "type": "mc", "text": "현관에서 벗은 신발은 어떻게 놓아야 할까?", "choices": ["벗은 방향 그대로 둔다", "신발장에 바로 넣는다", "신발 코가 문 쪽을 향하게 돌려 가지런히 놓는다", "한쪽 구석에 모아 둔다"], "answer": 2, "explain": "신발 코가 문 쪽을 향하게 돌려놓는 것이 다음에 신고 나가기 편하게 하는 배려다."}, {"n": 9, "type": "mc", "text": "다음 중 젓가락 예절로 **해도 되는** 것은?", "choices": ["밥에 젓가락 꽂아 두기", "젓가락끼리 음식 주고받기", "젓가락으로 그릇 끌어당기기", "젓가락을 젓가락 받침에 올려 두기"], "answer": 3, "explain": "①~③은 젓가락 금기. 특히 ①·②는 장례 의식을 떠올리게 해 큰 실례다. 쓰지 않을 때는 받침에 올려 둔다."}, {"n": 10, "type": "mc", "text": "갑자기 몸이 아플 때 가장 먼저 해야 할 행동은?", "choices": ["참고 일정을 계속한다", "혼자 약국을 찾아간다", "호스트 가족에게 「구아이가 와루이데스」라고 말하고 인솔교사에게 연락한다", "한국의 부모님께 먼저 전화한다"], "answer": 2, "explain": "참지 말고 말하기 + 즉시 인솔교사 연락이 원칙."}], "groups": [{"title": "물건 준비", "items": ["호스트 가정 선물(5만원 이내)을 준비했다.", "자기소개 카드(명함 5~10매)를 준비했다.", "칫솔 등 개인 위생용품을 챙겼다.", "상비약(알러지 완화약 포함)을 챙겼다.", "번역앱을 설치하고 오프라인 사전을 다운로드했다.", "핸드북 비상연락 빈칸에 인솔교사 연락처와 학교 대표번호를 모두 적었다."]}, {"title": "표현 준비", "items": ["첫 대면 인사 「하지메마시테, 요로시쿠 오네가이시마스」를 말할 수 있다.", "식사 전후 「이타다키마스」 「고치소-사마데시타」를 말할 수 있다.", "「스미마셍가, 오네가이시마스」(부탁 문형)를 말할 수 있다.", "(해당자) 내 알러지 음식으로 「○○와 다베라레마셍」 문장을 완성해 외웠다.", "비상 표현 「구아이가 와루이데스」 「모- 이치도 오네가이시마스」를 말할 수 있다."]}, {"title": "행동 약속", "items": ["목욕 규칙 3가지(들어가기 전 몸 씻기 · 욕조에서 비누 금지 · 물 빼지 않기)를 설명할 수 있다.", "화장실 전용 슬리퍼를 나올 때 원위치하는 것을 기억한다.", "젓가락 금기 4가지를 말할 수 있다.", "집합 5분 전 행동을 약속한다 (7/31 04:20 학교 출발 포함)."]}]};
const $ = (s) => document.querySelector(s);
let mode = null, idx = 0, answers = Array(D.quiz.length).fill(null), revealed = false;

const app = $('#app');
const setMode = (m) => { mode = m; idx = 0; answers.fill(null); $('#modeLabel').textContent =
  m === 'together' ? '함께 풀기' : '혼자 풀기'; $('#restart').style.display = 'inline-block'; render(); };

function start() {
  mode = null; $('#modeLabel').textContent = ''; $('#restart').style.display = 'none';
  app.innerHTML = `<div class="card start">
    <h1>셀프 체크 퀴즈</h1>
    <p>2026 자매교 방문 · 홈스테이 문화·예절 &nbsp;|&nbsp; 퀴즈 10문항 + 체크리스트 15항목</p>
    <div class="modes">
      <button class="mode-card" id="m1"><b>함께 풀기</b><span>화면을 같이 보며 진행합니다.<br>문제 → 다 같이 답 → 정답 공개</span></button>
      <button class="mode-card" id="m2"><b>혼자 풀기</b><span>각자 답을 고르고 바로 채점합니다.<br>마지막에 점수와 오답 확인</span></button>
    </div>
    <p class="hint">함께 풀기에서는 → ← 방향키로도 넘길 수 있어요.</p></div>`;
  $('#m1').onclick = () => setMode('together');
  $('#m2').onclick = () => setMode('solo');
}

function render() {
  if (idx >= D.quiz.length) return renderResult();
  const q = D.quiz[idx];
  revealed = mode === 'solo' && answers[idx] !== null;
  const pct = (idx / D.quiz.length) * 100;
  app.innerHTML = `<div class="bar"><i style="width:${pct}%"></i></div>
    <div class="meta"><span>문제 ${idx + 1} / ${D.quiz.length}</span><span>${q.type === 'ox' ? 'O X 문제' : '선택형'}</span></div>
    <div class="card ${q.type === 'ox' ? 'ox' : ''}">
      <div class="qtext">${q.text}</div>
      <div class="choices" id="ch"></div>
      <div class="reveal" id="rv"><div class="a"></div><div class="e"></div></div>
      <div class="nav">
        <button class="btn ghost" id="prev" ${idx === 0 ? 'disabled' : ''}>← 이전</button>
        <div class="spacer"></div>
        ${mode === 'together' ? '<button class="btn" id="next">정답 보기 →</button>'
                              : '<button class="btn" id="next" disabled>다음 →</button>'}
      </div>
      ${mode === 'together' ? '<p class="hint">학생들이 손·구두로 답한 뒤 [정답 보기]를 누르세요. (→ 키)</p>' : ''}
    </div>`;
  const ch = $('#ch');
  q.choices.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = q.type === 'ox' ? c : `<span class="k">${'①②③④'[i]}</span><span>${c}</span>`;
    b.onclick = () => pick(i);
    ch.appendChild(b);
  });
  $('#prev').onclick = () => { if (idx > 0) { idx--; render(); } };
  $('#next').onclick = next;
  if (mode === 'solo' && answers[idx] !== null) showAnswer();
  if (mode === 'together' && revealed) showAnswer();
}

function pick(i) {
  const q = D.quiz[idx];
  if (mode === 'solo') {
    if (answers[idx] !== null) return;
    answers[idx] = i;
    showAnswer();
    $('#next').disabled = false;
  } else {
    if (!revealed) { revealed = true; showAnswer(); }
  }
}

function showAnswer() {
  const q = D.quiz[idx];
  revealed = true;
  const btns = document.querySelectorAll('.choice');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add('correct');
    if (mode === 'solo' && answers[idx] === i && i !== q.answer) b.classList.add('wrong');
  });
  const rv = $('#rv');
  rv.classList.add('on');
  rv.querySelector('.a').textContent = '정답: ' + (q.type === 'ox' ? q.choices[q.answer] : '①②③④'[q.answer] + ' ' + q.choices[q.answer]);
  rv.querySelector('.e').textContent = q.explain;
  const nx = $('#next');
  nx.disabled = false;
  nx.textContent = idx === D.quiz.length - 1 ? '결과 보기 →' : '다음 →';
}

function next() {
  if (mode === 'together' && !revealed) { revealed = true; showAnswer(); return; }
  idx++; render();
}

function renderResult() {
  const score = D.quiz.filter((q, i) => answers[i] === q.answer).length;
  const wrong = D.quiz.filter((q, i) => answers[i] !== null && answers[i] !== q.answer);
  const pass = score >= 8;
  const solo = mode === 'solo';
  app.innerHTML = `<div class="bar"><i style="width:100%"></i></div>
    <div class="card">
      ${solo ? `<div class="score">${score}<small> / ${D.quiz.length}</small></div>
        <div class="verdict ${pass ? 'pass' : 'fail'}">${pass ? '통과! 잘했어요 👏' : '핸드북 해당 쪽을 다시 읽고 7/30 최종 모임에서 재도전!'}</div>
        ${wrong.length ? `<div class="wrongs"><h3>다시 볼 문제</h3><ul>${wrong.map((q) => `<li>Q${q.n}. ${q.text}</li>`).join('')}</ul></div>` : ''}`
             : `<h1>퀴즈 끝! 이제 체크리스트</h1>
        <p class="hint">채점 기준: 8개 이상 통과 / 7개 이하는 핸드북 해당 쪽을 다시 읽고 7/30에 재도전.</p>`}
      <div class="nav"><button class="btn ghost" id="prev">← 이전</button><div class="spacer"></div>
        <button class="btn" id="toCk">홈스테이 준비 체크리스트 →</button></div>
    </div>`;
  $('#prev').onclick = () => { idx = D.quiz.length - 1; render(); };
  $('#toCk').onclick = renderChecklist;
}

function renderChecklist() {
  const saved = JSON.parse(localStorage.getItem('pc_homestay_ck') || '{}');
  app.innerHTML = `<div class="card">
    <h1>홈스테이 준비 체크리스트</h1>
    <p class="hint" style="margin:6px 0 18px">7/20 교육 후 1차 체크, 7/30 최종 모임에서 최종 확인. 모두 체크되어야 출발 준비 완료!</p>
    <div class="ckbar"><div class="bar" style="flex:1;margin:0"><i id="ckfill"></i></div><b id="ckcount"></b></div>
    <div id="cks"></div>
    <div class="nav"><button class="btn ghost" id="back">← 퀴즈로</button><div class="spacer"></div>
      <button class="btn ghost" id="reset">체크 초기화</button></div>
    <p class="hint">체크 상태는 이 브라우저에 저장돼요. 종이 인쇄본은 PDF를 사용하세요.</p></div>`;
  const box = $('#cks');
  let k = 0;
  D.groups.forEach((g) => {
    const d = document.createElement('div');
    d.className = 'ckgroup';
    d.innerHTML = `<h3>${g.title}</h3>`;
    g.items.forEach((it) => {
      k++;
      const id = 'ck' + k;
      const l = document.createElement('label');
      l.className = 'ck';
      l.innerHTML = `<input type="checkbox" id="${id}" ${saved[id] ? 'checked' : ''}><span>${k}. ${it}</span>`;
      l.querySelector('input').onchange = (e) => {
        saved[id] = e.target.checked;
        localStorage.setItem('pc_homestay_ck', JSON.stringify(saved));
        upd();
      };
      d.appendChild(l);
    });
    box.appendChild(d);
  });
  const upd = () => {
    const all = document.querySelectorAll('#cks input');
    const n = [...all].filter((i) => i.checked).length;
    $('#ckfill').style.width = (n / all.length) * 100 + '%';
    $('#ckcount').textContent = `${n} / ${all.length}`;
  };
  upd();
  $('#back').onclick = () => { idx = 0; render(); };
  $('#reset').onclick = () => { localStorage.removeItem('pc_homestay_ck'); renderChecklist(); };
}

document.addEventListener('keydown', (e) => {
  if (!mode) return;
  if (e.key === 'ArrowRight' && $('#next') && !$('#next').disabled) next();
  if (e.key === 'ArrowLeft' && $('#prev') && !$('#prev').disabled) $('#prev').click();
});
$('#restart').onclick = start;
start();
</script>
</body></html>
